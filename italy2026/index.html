<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Italien 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #8B2500 0%, #C0562A 55%, #D4834A 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #FDF6EE;
      border-radius: 20px;
      padding: 40px 32px 36px;
      width: min(360px, calc(100vw - 40px));
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }
    .flag { font-size: 48px; margin-bottom: 14px; line-height: 1; }
    h1 {
      font-size: 28px;
      font-weight: 800;
      color: #2A2A2A;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: #7A7068;
      margin-bottom: 28px;
    }
    .pin-input {
      width: 100%;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5em;
      text-align: center;
      padding: 14px 16px;
      border: 2px solid #E8DDD2;
      border-radius: 12px;
      background: #fff;
      color: #2A2A2A;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    .pin-input:focus { border-color: #C0562A; }
    .pin-input.error { border-color: #C0562A; animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }
    .btn {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: #C0562A;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-appearance: none;
    }
    .btn:active { background: #9E4220; transform: scale(0.98); }
    .error-msg {
      margin-top: 14px;
      font-size: 13px;
      color: #C0562A;
      font-weight: 600;
      min-height: 18px;
    }
    .spinner {
      display: none;
      width: 22px; height: 22px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .spinner { display: inline-block; }
    .btn.loading .btn-label { display: none; }
  </style>
</head>
<body>

    <div class="flag">🇮🇹</div>
    <h1>Italien 2026</h1>
    <p class="subtitle">Ange PIN-kod för att fortsätta</p>
    <input id="pin" class="pin-input" type="password" inputmode="numeric"
           pattern="[0-9]*" maxlength="6" autocomplete="off"
           placeholder="——————" autofocus>
    <button id="btn" class="btn" onclick="unlock()">
      <span class="btn-label">Öppna</span>
      <div class="spinner"></div>
    </button>
    <p id="errmsg" class="error-msg"></p>
  </div>

  <script>
    const pinInput = document.getElementById('pin');
    const btn      = document.getElementById('btn');
    const errmsg   = document.getElementById('errmsg');

    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
    pinInput.addEventListener('input',   () => { errmsg.textContent = ''; pinInput.classList.remove('error'); });

    async function unlock() {
      const pin = pinInput.value.trim();
      if (pin.length !== 6) { shake('Ange 6 siffror'); return; }

      btn.classList.add('loading');
      errmsg.textContent = '';

      try {
        const p    = JSON.parse(document.getElementById('payload').textContent);
        const salt = b64ToBytes(p.salt);
        const iv   = b64ToBytes(p.iv);
        const ct   = b64ToBytes(p.ct);
        const enc  = new TextEncoder();

        const keyMat = await crypto.subtle.importKey(
          'raw', enc.encode(pin), 'PBKDF2', false, ['deriveKey']
        );
        const key = await crypto.subtle.deriveKey(
          { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
          keyMat,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );
        const plainBuf = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
        const html     = new TextDecoder().decode(plainBuf);

        document.open();
        document.write(html);
        document.close();
      } catch (_) {
        btn.classList.remove('loading');
        shake('Fel PIN-kod. Försök igen.');
      }
    }

    function shake(msg) {
      errmsg.textContent = msg;
      pinInput.value = '';
      pinInput.classList.add('error');
      pinInput.focus();
      setTimeout(() => pinInput.classList.remove('error'), 400);
    }

    function b64ToBytes(b64) {
      const bin = atob(b64);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    }
  </script>
